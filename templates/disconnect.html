<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garminfit Connector — Disconnect</title>
  <link rel="icon" href="/static/icon.ico" type="image/x-icon" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0D0D1C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #16162A;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      padding: 2.5rem;
      max-width: 460px;
      width: 100%;
    }
    .icon { margin-bottom: 0.75rem; }
    .icon img { width: 52px; height: 52px; border-radius: 10px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #E8EAF2; margin-bottom: 0.25rem; }
    .subtitle { color: #8A90AA; font-size: 0.95rem; margin-bottom: 1.75rem; }
    .warning-box {
      background: #1C1208;
      border: 1px solid #3A2810;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.875rem;
      color: #C08040;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    label { display: block; font-size: 0.875rem; font-weight: 600; color: #C0C4D8; margin-bottom: 0.35rem; }
    input[type="email"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: #0D0D1A;
      border: 1.5px solid #2A2A46;
      border-radius: 8px;
      font-size: 1rem;
      color: #E8EAF2;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }
    input::placeholder { color: #3E4260; }
    input:focus { border-color: #8A2030; }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #7A1E2A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #9A2838; }
    .btn:disabled { background: #22223A; color: #4A4E68; cursor: not-allowed; }
    .error-box {
      background: #1E0E0E;
      border: 1px solid #3E1E1E;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #E06060;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .success-box {
      background: #111E1A;
      border: 1px solid #1E3830;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: #5CC98A;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .success-box a { color: #5CC98A; font-weight: 600; }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #5A5F78;
    }
    .footer-links a { color: #7080B8; text-decoration: none; }
    .footer-links a:hover { color: #A0B0D8; text-decoration: underline; }
    #result { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="/static/icon.ico" alt="Garminfit" /></div>
    <h1>Disconnect Garmin</h1>
    <p class="subtitle">Enter your Garmin Connect email to revoke your MCP connection.</p>

    <div class="warning-box">
      ⚠️ <strong>This will invalidate your MCP URL.</strong> Claude will no longer have access to your Garmin data. You can reconnect at any time by visiting the setup page.
    </div>

    <div id="form-section">
      <div id="error-box" class="error-box" style="display:none;"></div>
      <div>
        <label for="email">Garmin Connect Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <button class="btn" id="btn-disconnect" onclick="doDisconnect()">Disconnect My Account</button>
    </div>

    <div id="result" class="success-box"></div>

    <div class="footer-links">
      Changed your mind? <a href="/setup">Reconnect your Garmin account</a>
    </div>
  </div>

  <script>
    async function doDisconnect() {
      const email = document.getElementById('email').value.trim();
      const errorBox = document.getElementById('error-box');
      errorBox.style.display = 'none';

      if (!email) {
        errorBox.textContent = 'Please enter your Garmin email address.';
        errorBox.style.display = 'block';
        return;
      }

      const btn = document.getElementById('btn-disconnect');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Disconnecting…';

      try {
        const resp = await fetch('/api/disconnect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          errorBox.textContent = data.error || 'Disconnect failed. Please try again.';
          errorBox.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = 'Disconnect My Account';
          return;
        }

        document.getElementById('form-section').style.display = 'none';
        const result = document.getElementById('result');
        result.innerHTML = `
          ✅ <strong>Disconnected successfully.</strong><br><br>
          ${data.message}<br><br>
          <a href="/setup">Reconnect Garmin →</a>
        `;
        result.style.display = 'block';

      } catch (err) {
        errorBox.textContent = 'Network error. Please try again.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Disconnect My Account';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doDisconnect();
    });
  </script>
</body>
</html>
